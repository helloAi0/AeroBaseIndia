name: Deploy AeroBase

on:
  push:
    tags:
      - 'v*' # Triggers only when you push a tag like v1.0, v2.1.4, etc.

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source
        uses: actions/checkout@v4

      # --- Docker Stage ---
      - name: Login DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USER }}
          password: ${{ secrets.DOCKER_PASS }}

      - name: Build and Push image
        run: |
          # Using ref_name (e.g., v1.0.0) instead of SHA for the image tag
          # This makes your Docker Hub and K8s look much more professional
          IMAGE_TAG=${{ github.ref_name }}
          docker build -t ${{ secrets.DOCKER_USER }}/aerobase:$IMAGE_TAG .
          docker push ${{ secrets.DOCKER_USER }}/aerobase:$IMAGE_TAG

      # --- Kubernetes Stage ---
      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: 'latest'

      - name: Set Kubernetes Context
        run: |
          mkdir -p ~/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > ~/.kube/config

      - name: Deploy to Kubernetes
        run: |
          # Update the deployment to use the NEW version tag
          kubectl set image deployment/aerobase-backend \
          aerobase-app=${{ secrets.DOCKER_USER }}/aerobase:${{ github.ref_name }} \
          -n aerobase
          
      - name: Verify Deployment
        run: |
          kubectl rollout status deployment/aerobase-backend -n aerobase