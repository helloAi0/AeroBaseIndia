name: AeroBase CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    # Redis service container for integration testing
    services:
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake g++ libpqxx-dev libpq-dev uuid-dev \
            libjsoncpp-dev libhiredis-dev redis-tools \
            zlib1g-dev libssl-dev

      - name: Configure CMake
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build AeroBase
        run: cmake --build build -j$(nproc)

      # --- The Testing Gate ---
      - name: Run tests
        # --test-dir points CTest to your build artifacts without needing 'cd'
        # --output-on-failure ensures you see what went wrong in the GitHub log
        run: ctest --test-dir build --output-on-failure

      - name: Build Docker image
        run: |
          docker build -t aerobase-india:latest .

      # --- Deployment Step (Only runs on push to main) ---
      - name: Login to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push to Docker Hub
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          docker tag aerobase-india:latest ${{ secrets.DOCKER_USERNAME }}/aerobase-backend:latest
          docker tag aerobase-india:latest ${{ secrets.DOCKER_USERNAME }}/aerobase-backend:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USERNAME }}/aerobase-backend --all-tags