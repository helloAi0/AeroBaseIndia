name: AeroBase CI Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Redis service for integration testing
    services:
      redis:
        image: redis
        ports:
          - 6379:6379

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            cmake \
            g++ \
            libpqxx-dev \
            libpq-dev \
            uuid-dev \
            libjsoncpp-dev \
            libhiredis-dev \
            redis-tools

      - name: Configure
        run: |
          mkdir build
          cd build
          cmake ..

      - name: Build
        run: |
          cd build
          make -j$(nproc)

      - name: Run tests
        run: |
          cd build
          ctest --output-on-failure

      - name: Build Docker image
        run: |
          docker build -t aerobase-india .

      # --- New Deployment Steps ---
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      - name: Push Docker image
        run: |
          docker tag aerobase-india ${{ secrets.DOCKER_USERNAME }}/aerobase-india:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/aerobase-india:latest