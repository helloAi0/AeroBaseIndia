apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: aerobase-hpa
  namespace: aerobase
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: aerobase-backend
  minReplicas: 3
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70