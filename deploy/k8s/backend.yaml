apiVersion: apps/v1
kind: Deployment
metadata:
  name: aerobase-backend
  namespace: aerobase
spec:
  replicas: 3 # Running 3 copies for high availability
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1 # Only 1 pod can be down at a time
      maxSurge: 1       # K8s can create 1 extra pod during the switch
  selector:
    matchLabels:
      app: backend
  template:
    metadata:
      labels:
        app: backend
    spec:
      containers:
        - name: aerobase-app
          image: helloai0/aerobase-backend:v1 # Your Docker image
          ports:
            - containerPort: 8080
          env:
            - name: DB_HOST
              value: "postgres-service"
            - name: REDIS_HOST
              value: "redis-service"
          # Readiness probe ensures K8s doesn't send traffic to a 
          # pod that is still booting up or connecting to DB.
          readinessProbe:
            httpGet:
              path: /api/health
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: backend-service
  namespace: aerobase
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/path: "/metrics"
    prometheus.io/port: "8080"
spec:
  type: LoadBalancer # Exposes your app to the internet
  selector:
    app: backend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080