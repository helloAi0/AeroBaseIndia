version: '3.9'

services:
  backend:
    build: .
    container_name: aerobase_backend
    ports:
      - "8080:8080"
    depends_on:
      - postgres
      - redis
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: aerobase
      DB_USER: postgres
      DB_PASSWORD: password
      REDIS_HOST: redis
      REDIS_PORT: 6379

  postgres:
    image: postgres:15
    container_name: aerobase_postgres
    restart: always
    environment:
      POSTGRES_DB: aerobase
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"

  redis:
    image: redis:7
    container_name: aerobase_redis
    restart: always
    ports:
      - "6379:6379"